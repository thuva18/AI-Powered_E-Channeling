services:
  # 1. Node.js Backend Web Service
  - type: web
    name: echanneling-backend
    plan: free
    env: node
    rootDir: apps/backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 8000
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false # Requires manual entry in the dashboard
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: PAYHERE_MERCHANT_ID
        sync: false
      - key: PAYHERE_MERCHANT_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: AI_SERVICE_URL
        fromService:
          type: web
          name: echanneling-ai-service
          envVarKey: RENDER_EXTERNAL_URL

  # 2. Python AI Service Web Service
  - type: web
    name: echanneling-ai-service
    plan: free
    env: python
    rootDir: apps/ai-service
    buildCommand: pip install -r requirements.txt
    startCommand: AI_PORT=$PORT python app.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0

  # 3. React Frontend Static Site
  - type: web
    name: echanneling-frontend
    env: static
    rootDir: apps/web
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: echanneling-backend
          envVarKey: RENDER_EXTERNAL_URL
        # Append /api/v1 so the frontend calls the right backend path
        # Note: Render doesn't support suffixing in fromService directly, but the frontend code typically appends /api/v1 if not present,
        # or we can define it directly. Actually, the frontend code says:
        # const apiBaseURL = import.meta.env.VITE_API_BASE_URL || '/api/v1';
