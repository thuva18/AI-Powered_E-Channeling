<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EER Diagram - Medicare E-Channeling</title>
    <!-- Include viz.js for client-side graphviz rendering -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/viz.js/2.1.2/viz.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/viz.js/2.1.2/full.render.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f8fafc;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .header h1 {
            color: #0f172a;
            margin-bottom: 5px;
        }

        .header p {
            color: #475569;
            margin-top: 0;
        }

        #graph-container {
            width: 95vw;
            height: 80vh;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            overflow: auto;
            /* enable scrolling if diagram is large */
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Make the SVG scalable but crisp */
        svg {
            max-width: 100%;
            height: auto;
        }
    </style>
</head>

<body>
    <div class="header">
        <h1>Entity-Relationship Diagram (EER)</h1>
        <p>Medicare E-Channeling Database | Standard Chen Notation</p>
    </div>

    <div id="graph-container">
        <!-- SVG will be injected here -->
    </div>

    <script>
        const dotString = `
graph EER {
    node [fontname="Helvetica", fontsize=11];
    edge [fontname="Helvetica", fontsize=10];
    
    // Engine settings for better academic EER spread
    layout="neato";
    overlap=false;
    splines=true;
    nodesep=1.0;
    ranksep=1.0;

    // --- ENTITIES ---
    node [shape=box, style=filled, fillcolor="#f1f5f9"];
    USER; PATIENT; DOCTOR; ADMIN; APPOINTMENT; TRANSACTION; JOURNAL;

    // --- ATTRIBUTES ---
    node [shape=ellipse, style=solid, fillcolor=white];
    
    // User Attributes
    u_id [label=<<U>id</U>>];
    u_email [label="email"];
    u_role [label="role"];
    u_pass [label="password"];
    USER -- u_id; USER -- u_email; USER -- u_role; USER -- u_pass;

    // Patient Attributes
    p_fn [label="first\\nName"];
    p_ln [label="last\\nName"];
    p_dob [label="dob"];
    p_nic [label="nic"];
    PATIENT -- p_fn; PATIENT -- p_ln; PATIENT -- p_dob; PATIENT -- p_nic;

    // Doctor Attributes
    d_slmc [label="slmcNumber"];
    d_spec [label="specialization"];
    d_fee [label="fee"];
    DOCTOR -- d_slmc; DOCTOR -- d_spec; DOCTOR -- d_fee;

    // Admin Attributes
    a_level [label="accessLevel"];
    ADMIN -- a_level;

    // Appointment Attributes
    app_id [label=<<U>id</U>>];
    app_date [label="date"];
    app_status [label="status"];
    app_symptoms [label="symptoms", peripheries=2]; // Multivalued
    APPOINTMENT -- app_id; APPOINTMENT -- app_date; APPOINTMENT -- app_status; APPOINTMENT -- app_symptoms;

    // Transaction Attributes
    t_id [label=<<U>id</U>>];
    t_amount [label="amount"];
    t_num [label="receiptNum"];
    t_method [label="method"];
    TRANSACTION -- t_id; TRANSACTION -- t_amount; TRANSACTION -- t_num; TRANSACTION -- t_method;

    // Journal Attributes
    j_id [label=<<U>id</U>>];
    j_diag [label="diagnosis"];
    j_pres [label="prescription"];
    JOURNAL -- j_id; JOURNAL -- j_diag; JOURNAL -- j_pres;

    // --- IS-A SPECIALIZATION (Subclasses) ---
    // Using a circle with 'd' indicating Disjoint specialization (academic standard)
    node [shape=circle, label="d", fillcolor="#e2e8f0", style=filled, fixedsize=true, width=0.4];
    ISA [label="d"];
    
    // Connect Superclass (Total Participation double line simulated via penwidth)
    USER -- ISA [penwidth=3]; 
    
    // Connect Subclasses
    ISA -- PATIENT;
    ISA -- DOCTOR;
    ISA -- ADMIN;

    // --- RELATIONSHIPS ---
    node [shape=diamond, fillcolor="#bae6fd", style=filled, fixedsize=false];
    BOOKS [label="BOOKS"];
    ATTENDS [label="ATTENDS"];
    PAYS [label="PAYS"];
    GENERATES [label="GENERATES"];
    WRITES [label="WRITES"];
    RECORDS [label="RECORDS FOR"];

    // Connect Relationships with Structural Constraints (Cardinalities)
    PATIENT -- BOOKS [label=" 1 "];
    BOOKS -- APPOINTMENT [label=" N "];

    DOCTOR -- ATTENDS [label=" 1 "];
    ATTENDS -- APPOINTMENT [label=" N "];

    PATIENT -- PAYS [label=" 1 "];
    PAYS -- TRANSACTION [label=" N "];

    APPOINTMENT -- GENERATES [label=" 1 "];
    GENERATES -- TRANSACTION [label=" 1 "];

    DOCTOR -- WRITES [label=" 1 "];
    WRITES -- JOURNAL [label=" N "];

    PATIENT -- RECORDS [label=" 1 "];
    RECORDS -- JOURNAL [label=" N "];
}
        `;

        var viz = new Viz();

        viz.renderSVGElement(dotString)
            .then(function (element) {
                document.getElementById('graph-container').appendChild(element);

                // Allow zooming / panning out-of-the-box via simply setting viewBox width/height to 100%
                element.setAttribute('width', '100%');
                element.setAttribute('height', '100%');
            })
            .catch(error => {
                // Create a new Viz instance (@see Caveats page for details)
                viz = new Viz();
                console.error(error);
                document.getElementById('graph-container').innerHTML = '<p style="color:red">Failed to render diagram. Check console syntax.</p>';
            });
    </script>
</body>

</html>
